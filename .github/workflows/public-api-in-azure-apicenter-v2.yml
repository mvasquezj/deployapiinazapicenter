name: Deploy API REST in Azure API Center V2

on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  public_api_in_apicenter:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Extract OpenAPI metadata
        id: extract
        run: |
          TITLE=$(yq '.info.title' api-specs/openapi.yaml)
          VERSION=$(yq '.info.version' api-specs/openapi.yaml)
          API_ID=$(yq '.info."x-api-id"' api-specs/openapi.yaml)
          OPENAPI_VERSION=$(yq '.openapi' api-specs/openapi.yaml)
          
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "api_id=$API_ID" >> $GITHUB_OUTPUT
          echo "openapi_version=$OPENAPI_VERSION" >> $GITHUB_OUTPUT

      - name: Create API (if not exists)
        uses: azure/CLI@v3
        with:
          azcliversion: latest
          inlineScript: |
            # Si no existe, este comando fallará, por eso usamos 'update' si ya existe
            az apic api update \
              --resource-group rg-articulos \
              --service-name api-center-mv \
              --api-id "${{ steps.extract.outputs.api_id }}" \
              --title "${{ steps.extract.outputs.title }}" \
              --type rest || \
            az apic api create \
              --resource-group rg-articulos \
              --service-name api-center-mv \
              --api-id "${{ steps.extract.outputs.api_id }}" \
              --title "${{ steps.extract.outputs.title }}" \
              --type rest

            # 2. Actualizar o Crear la Versión
            az apic api version update \
              --resource-group rg-articulos \
              --service-name api-center-mv \
              --api-id "${{ steps.extract.outputs.api_id }}" \
              --version-id $(echo "${{ steps.extract.outputs.version }}" | tr '[:upper:]' '[:lower:]' | tr '.' '-') \
              --title "${{ steps.extract.outputs.version }}" || \
              --lifecycle-stage "production"
            az apic api version create \
              --resource-group rg-articulos \
              --service-name api-center-mv \
              --api-id "${{ steps.extract.outputs.api_id }}" \
              --version-id $(echo "${{ steps.extract.outputs.version }}" | tr '[:upper:]' '[:lower:]' | tr '.' '-') \
              --title "${{ steps.extract.outputs.version }}" || \
              --lifecycle-stage "production"

            # 3. IMPORTANTE: La definición se actualiza subiendo el archivo de nuevo
            # El comando 'import-specification' es el ideal para actualizar el contenido del YAML
            az apic api definition import-specification \
              --resource-group rg-articulos \
              --service-name api-center-mv \
              --api-id "${{ steps.extract.outputs.api_id }}" \
              --version-id $(echo "${{ steps.extract.outputs.version }}" | tr '[:upper:]' '[:lower:]' | tr '.' '-') \
              --definition-id "openapi" \
              --format "inline" \
              --specification '{"name":"openapi","version":"${{ steps.extract.outputs.openapi_version }}"}' \
              --value "$(cat ./api-specs/openapi.yaml)"
